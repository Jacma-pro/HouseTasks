<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>HouseTasks — Dashboard mobile</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; background: #EFEFEA; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; color: #191917; }
  *, *::before, *::after { box-sizing: border-box; }
  button { font-family: inherit; }
  #root { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px 16px; }

  /* Two presentations: stage with iOS frame (desktop), plain fill (mobile ≤ 500px) */
  @media (max-width: 500px) {
    #root { padding: 0; align-items: stretch; }
    #stage { transform: none !important; }
  }

  /* Browser scrollbar hide for the screen */
  .screen::-webkit-scrollbar { width: 0; height: 0; }

  .tag-strip {
    position: fixed; top: 16px; left: 16px; right: 16px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: #5A5A52; pointer-events: none; z-index: 100;
  }
  @media (max-width: 500px) { .tag-strip { display: none; } }
  nav.pager {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; background: rgba(255,255,255,0.92);
    backdrop-filter: blur(16px); padding: 6px; border-radius: 999px;
    border: 1px solid #E6E6E1; box-shadow: 0 4px 12px rgba(25,25,23,0.08);
    z-index: 100; font-size: 12px;
  }
  nav.pager a {
    padding: 6px 12px; border-radius: 999px; color: #3F3F39;
    text-decoration: none; font-weight: 600; white-space: nowrap;
  }
  nav.pager a[aria-current="page"] { background: #2D6A4F; color: #fff; }
  @media (max-width: 500px) { nav.pager { display: none; } }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div class="tag-strip">
  <span><b style="color:#191917">HouseTasks</b> · Dashboard · 402×874</span>
  <span>Plus Jakarta Sans · WCAG AA</span>
</div>

<nav class="pager" aria-label="Screens">
  <a href="login-mobile.html">Login</a>
  <a href="dashboard-mobile.html" aria-current="page">Dashboard</a>
  <a href="tasks-mobile.html">Tasks</a>
  <a href="task-detail-mobile.html">Detail</a>
  <a href="create-task-mobile.html">Create</a>
  <a href="calendar-mobile.html">Calendar</a>
  <a href="family-mobile.html">Family</a>
  <a href="profile-mobile.html">Profile</a>
</nav>

<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel">
  const { IOSDevice, DashboardScreen } = window;

  function App() {
    const isMobile = typeof window !== 'undefined' && window.matchMedia('(max-width: 500px)').matches;
    if (isMobile) {
      // Full-viewport (no device frame) on small screens
      return (
        <div style={{ width: '100%', minHeight: '100vh', background: '#FAFAF8' }}>
          <DashboardScreen />
        </div>
      );
    }
    return (
      <div id="stage">
        <IOSDevice width={402} height={874}>
          <DashboardScreen />
        </IOSDevice>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
