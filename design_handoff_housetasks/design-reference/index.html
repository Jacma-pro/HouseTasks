<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>HouseTasks — Design System</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #EFEFEA; font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif; color: #191917; }
  *, *::before, *::after { box-sizing: border-box; }
  button { font-family: inherit; }
  #root { height: 100%; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="tokens-doc.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard, IOSDevice } = window;
  const {
    TokensCover, ColorPalette, Typography, SpacingRadii, Components,
    LoginScreen, DashboardScreen, TasksScreen, TaskDetailScreen,
    CreateTaskScreen, CalendarScreen, FamilyScreen, ProfileScreen,
  } = window;

  // Phone frame wrapper — uses the IOSDevice starter
  const Phone = ({ children, dark = false }) => (
    <IOSDevice width={402} height={874} dark={dark}>
      {children}
    </IOSDevice>
  );

  // Screen artboard — phone sits inside a wider artboard so there's breathing room
  const ScreenBoard = (props) => (
    <DCArtboard {...props} width={440} height={900}>
      <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <Phone>{props.screen}</Phone>
      </div>
    </DCArtboard>
  );

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="cover" title="HouseTasks Design System" subtitle="Mobile-first · WCAG AA · Plus Jakarta Sans · 3 couleurs">
          <DCArtboard id="cover" label="Overview" width={900} height={640} style={{ background: '#FAFAF8' }}>
            <TokensCover />
          </DCArtboard>
        </DCSection>

        <DCSection id="tokens" title="Tokens" subtitle="Colors, typography, spacing, radii, elevation">
          <DCArtboard id="colors"   label="Colors"     width={820} height={780} style={{ background: '#FAFAF8' }}><ColorPalette /></DCArtboard>
          <DCArtboard id="type"     label="Typography" width={820} height={780} style={{ background: '#FAFAF8' }}><Typography /></DCArtboard>
          <DCArtboard id="spacing"  label="Spacing & Radii" width={820} height={780} style={{ background: '#FAFAF8' }}><SpacingRadii /></DCArtboard>
        </DCSection>

        <DCSection id="components" title="Components" subtitle="Buttons, inputs, badges, avatars, segmented, chips, task rows">
          <DCArtboard id="library" label="Library" width={900} height={1100} style={{ background: '#FAFAF8' }}>
            <Components />
          </DCArtboard>
        </DCSection>

        <DCSection id="auth" title="1 · Authentification" subtitle="Login — simple, warm, minimal">
          <ScreenBoard id="login" label="Login / Register" screen={<LoginScreen />} />
        </DCSection>

        <DCSection id="home" title="2 · Dashboard" subtitle="Greeting, stats, today's tasks, family status, smart nudge">
          <ScreenBoard id="dashboard" label="Home" screen={<DashboardScreen />} />
        </DCSection>

        <DCSection id="tasks" title="3–5 · Tasks" subtitle="List → detail → create (bottom sheet)">
          <ScreenBoard id="tasks-list" label="Tasks list" screen={<TasksScreen />} />
          <ScreenBoard id="task-detail" label="Task detail" screen={<TaskDetailScreen />} />
          <ScreenBoard id="task-create" label="Create task (modal)" screen={<CreateTaskScreen />} />
        </DCSection>

        <DCSection id="calendar" title="6 · Calendar" subtitle="Weekly availability — whole-family, at-a-glance">
          <ScreenBoard id="calendar" label="Calendar / Availability" screen={<CalendarScreen />} />
        </DCSection>

        <DCSection id="people" title="7–8 · People" subtitle="Family members · User profile">
          <ScreenBoard id="family"  label="Family members" screen={<FamilyScreen />} />
          <ScreenBoard id="profile" label="User profile"   screen={<ProfileScreen />} />
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
